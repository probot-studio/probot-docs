<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>404 - Sayfa Bulunamadı | Probot Lib</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1e3a8a;
      --primary-dark: #1e2c5e;
      --primary-light: #3b5998;
      --secondary: #06b6d4;
      --accent: #f59e0b;
      --dark: #0f172a;
      --gray: #64748b;
      --gray-light: #94a3b8;
      --white: #ffffff;
      --bg: #f8fafc;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      color: var(--dark);
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated Background */
    .bg-pattern {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0.1;
      background-image: 
        repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255,255,255,.1) 35px, rgba(255,255,255,.1) 70px),
        repeating-linear-gradient(-45deg, transparent, transparent 35px, rgba(255,255,255,.05) 35px, rgba(255,255,255,.05) 70px);
      animation: slide 20s linear infinite;
    }

    @keyframes slide {
      0% { transform: translate(0, 0); }
      100% { transform: translate(70px, 70px); }
    }

    /* Floating particles */
    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      animation: float 15s infinite ease-in-out;
    }

    .particle:nth-child(1) {
      width: 80px;
      height: 80px;
      top: 20%;
      left: 10%;
      animation-delay: 0s;
      animation-duration: 12s;
    }

    .particle:nth-child(2) {
      width: 120px;
      height: 120px;
      top: 60%;
      right: 10%;
      animation-delay: 2s;
      animation-duration: 15s;
    }

    .particle:nth-child(3) {
      width: 60px;
      height: 60px;
      bottom: 20%;
      left: 30%;
      animation-delay: 4s;
      animation-duration: 18s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.1; }
      50% { transform: translateY(-40px) rotate(180deg); opacity: 0.2; }
    }

    /* Main Container */
    .container {
      background: rgba(255, 255, 255, 0.98);
      border-radius: 24px;
      padding: 60px;
      max-width: 600px;
      width: 90%;
      text-align: center;
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.3),
        0 0 100px rgba(30, 58, 138, 0.2);
      position: relative;
      z-index: 10;
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 404 Number */
    .error-code {
      font-size: 120px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      line-height: 1;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Robot Icon */
    .robot-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto 30px;
      position: relative;
    }

    .robot-head {
      width: 60px;
      height: 60px;
      background: var(--primary);
      border-radius: 12px;
      margin: 0 auto;
      position: relative;
      animation: robotFloat 3s ease-in-out infinite;
    }

    .robot-head::before,
    .robot-head::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      background: white;
      border-radius: 50%;
      top: 18px;
    }

    .robot-head::before {
      left: 12px;
    }

    .robot-head::after {
      right: 12px;
    }

    .robot-antenna {
      position: absolute;
      width: 4px;
      height: 20px;
      background: var(--primary);
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
    }

    .robot-antenna::before {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      background: var(--secondary);
      border-radius: 50%;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes robotFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Text Content */
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 16px;
    }

    p {
      font-size: 16px;
      color: var(--gray);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    /* Buttons */
    .button-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      border: none;
      outline: none;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 14px rgba(30, 58, 138, 0.3);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(30, 58, 138, 0.4);
    }

    .btn-secondary {
      background: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    .btn-secondary:hover {
      background: var(--primary);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(30, 58, 138, 0.3);
    }

    /* Search Box */
    .search-box {
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
    }

    .search-label {
      font-size: 14px;
      color: var(--gray);
      margin-bottom: 12px;
      display: block;
    }

    .search-input-group {
      display: flex;
      gap: 8px;
      max-width: 400px;
      margin: 0 auto;
    }

    .search-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid rgba(148, 163, 184, 0.2);
      border-radius: 10px;
      font-size: 14px;
      transition: var(--transition);
      outline: none;
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
    }

    .search-btn {
      padding: 12px 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .search-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    /* Responsive */
    @media (max-width: 640px) {
      .container {
        padding: 40px 30px;
      }

      .error-code {
        font-size: 80px;
      }

      h1 {
        font-size: 24px;
      }

      .button-group {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }
    }

    /* Loading dots */
    .loading-dots {
      display: inline-block;
      margin-left: 4px;
    }

    .loading-dots::after {
      content: '...';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
  <!-- Background elements -->
  <div class="bg-pattern"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>

  <!-- Main Content -->
  <div class="container">
    <!-- Robot Icon -->
    <div class="robot-icon">
      <div class="robot-antenna"></div>
      <div class="robot-head"></div>
    </div>

    <!-- Error Code -->
    <div class="error-code">404</div>

    <!-- Text Content -->
    <h1>Oops! Sayfa Bulunamadı</h1>
    <p>
      Aradığınız sayfa taşınmış, silinmiş ya da hiç var olmamış olabilir. 
      Robot arkadaşımız her yeri aradı ama bulamadı<span class="loading-dots"></span>
    </p>

    <!-- Action Buttons -->
    <div class="button-group">
      <a href="/index.html" class="btn btn-primary">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Ana Sayfaya Dön
      </a>
      <a href="https://github.com/tunapro1234/probot-lib" class="btn btn-secondary">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
        </svg>
        GitHub'a Git
      </a>
    </div>

    <!-- Search Box -->
    <div class="search-box">
      <label class="search-label">Ya da dokümanlarda arama yapın:</label>
      <div class="search-input-group">
        <input type="text" class="search-input" placeholder="Neyi arıyorsunuz?" id="searchInput">
        <button class="search-btn" onclick="search()">Ara</button>
      </div>
    </div>
  </div>

  <script>
    // Search functionality
    function search() {
      const query = document.getElementById('searchInput').value.trim();
      if (query) {
        // Redirect to main page with search query
        window.location.href = `/index.html#search=${encodeURIComponent(query)}`;
      }
    }

    // Enter key support for search
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        search();
      }
    });

    // Fun easter egg: Robot eyes follow mouse
    let robotHead = document.querySelector('.robot-head');
    let eyes = robotHead.querySelectorAll('::before, ::after');
    
    document.addEventListener('mousemove', (e) => {
      const rect = robotHead.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      
      const angleX = (e.clientX - centerX) / window.innerWidth;
      const angleY = (e.clientY - centerY) / window.innerHeight;
      
      robotHead.style.transform = `perspective(1000px) rotateY(${angleX * 10}deg) rotateX(${-angleY * 10}deg)`;
    });
  </script>
</body>
</html>
