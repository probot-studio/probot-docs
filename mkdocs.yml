site_name: Probot Docs
site_description: Probot kütüphanesi dokümantasyonu
site_url: https://docs.probotstudio.com
site_author: Tuna Gül
copyright: "© 2025 Tuna Gül"
repo_url: https://github.com/nfrproducts/probot-docs

theme:
  name: material
  language: tr
  features:
    - navigation.tabs
    - content.code.copy
  custom_dir: overrides
  logo: assets/nfr-logo-white.png
  favicon: assets/favicon-filled-32.png

nav:
  - Giriş: index.md
  - Yazılım:
      - Genel: yazilim/index.md
      - Kurulum: yazilim/kurulum.md
      - Yazılım Geliştirme ve Kod Başlangıcı: yazilim/yazilim-gelistirme-kod-baslangici.md
      - Robot Yaşam Döngüsü: yazilim/robot-yasam-dongusu.md
      - Global Ayarlar: yazilim/global-ayarlar.md
      - Joystick API: yazilim/joystick-api.md
      - Robot Bağlantısı: yazilim/robot-baglantisi.md
      - Arayüz: yazilim/arayuz.md
      - Otonom Başlangıç: yazilim/otonom-baslangic.md
      - Telemetry: yazilim/telemetry.md
  - Referans:
      - Genel: referans/index.md
  - Ekstra Araçlar:
      - Probot Lib: ekstra-araclar/probot-lib.md
      - Probot Blocks: ekstra-araclar/probot-blocks.md
      - Probot Builder: ekstra-araclar/probot-builder.md
      - Probot Coder: ekstra-araclar/probot-coder.md
      - Probot Sim: ekstra-araclar/probot-sim.md
      - Probot Forums: ekstra-araclar/probot-forums.md

plugins:
  - search
  # - sitemap:
  #     changefreq: daily
  #     priority: 0.5
  - rss

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - footnotes
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.keys
  - meta

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - assets/links.js

extra:
  generator: false
  social:
    - type: github
      link: https://github.com/nfrproducts/probot-docs
  meta:
    - name: google-site-verification
      content: ""  # TODO: doğrulama kodunu girin
    - property: og:locale
      content: tr_TR
    # - name: twitter:site
    #   content: "@probotplatform"
    # - name: twitter:creator
    #   content: "@probotplatform" 
