site_name: Probot Kütüphane Dokümantasyonu
site_description: Probot kütüphanesi dokümantasyonu
repo_url: https://github.com/tunapro1234/probot-lib

theme:
  name: material
  language: tr
  features:
    - navigation.tabs
    - content.code.copy
  custom_dir: overrides

nav:
  - Giriş: index.md
  - Yarışma: yarisma/index.md
  - Yol Haritası: yol-haritasi/index.md
  - Mekanik: mekanik/index.md
  - Elektronik: elektronik/index.md
  - Yazılım:
      - Genel: yazilim/index.md
      - Örnekler: ornekler/index.md
  - Robot Örneği: robot-ornegi/index.md
  - SSS: sss/index.md
  - Referans: referans/index.md
  - Ekstra Araçlar:
      - Probot Lib: ekstra-araclar/probot-lib.md
      - Probot Blocks: ekstra-araclar/probot-blocks.md
      - Probot Builder: ekstra-araclar/probot-builder.md
      - Probot Coder: ekstra-araclar/probot-coder.md
      - Probot Sim: ekstra-araclar/probot-sim.md
      - Probot Forums: ekstra-araclar/probot-forums.md
  - Topluluk: topluluk.md

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - footnotes
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.highlight

extra_css:
  - stylesheets/extra.css

extra:
  generator: false 