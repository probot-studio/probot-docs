site_name: Probot Core
site_description: ESP32 tabanlı robot yarışması yazılım kütüphanesi dokümantasyonu
site_url: https://docs.probotstudio.com
site_author: Tuna Gül
copyright: "© 2026 Tuna Gül"
repo_url: https://github.com/probot-studio/probot-core

theme:
  name: material
  language: tr
  features:
    - navigation.instant
    - navigation.indexes
    - content.code.copy
  custom_dir: overrides
  favicon: assets/favicon-filled-32.png

nav:
  - Giriş: index.md
  - Kurulum: kurulum.md
  - İlk Bakış: baslangic.md
  - Yazılım: yazilim.md
  - Tuna'nın Yarışma Notları: notlar.md
  - Örnek Robot: ornekler.md
  - Hatalar: hatalar.md
  - Sinyal Temizliği: saha.md
  - LLMs: llms.md

plugins:
  - search
  # - sitemap:
  #     changefreq: daily
  #     priority: 0.5
  - rss

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - footnotes
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true
  - meta

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - assets/links.js

extra:
  generator: false
  social:
    - type: github
      link: https://github.com/probot-studio/probot-docs
  meta:
    - name: google-site-verification
      content: ""  # TODO: doğrulama kodunu girin
    - property: og:locale
      content: tr_TR
    # - name: twitter:site
    #   content: "@probotplatform"
    # - name: twitter:creator
    #   content: "@probotplatform" 
